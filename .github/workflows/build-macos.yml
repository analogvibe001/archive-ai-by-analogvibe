name: Build Archive AI (macOS)

# Compila el .app y el .dmg en un runner macOS de GitHub cada vez que haces
# push, o manualmente desde la pestaña Actions ("Run workflow").
# El resultado queda como artefacto descargable en la página del run.

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust (targets Intel + Apple Silicon)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache de cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/core-logic/Cargo.toml') }}

      # Paso rápido que aísla errores de la lógica pura antes del build completo
      - name: Verificar lógica de negocio (cargo check + tests)
        working-directory: src-tauri/core-logic
        run: |
          cargo check
          cargo test

      - name: Instalar tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked

      # Binario universal: corre nativo tanto en Macs Intel como Apple Silicon
      - name: Compilar la app (universal)
        working-directory: src-tauri
        run: cargo tauri build --target universal-apple-darwin

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: Archive-AI-macOS
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      # Release público con link fijo para compartir la app
      - name: Publicar Release de GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Archive AI — última versión
          body: |
            **Instalación en cualquier Mac (Intel o Apple Silicon, macOS 11+):**

            1. Descarga el `.dmg` de abajo y ábrelo
            2. Arrastra **Archive AI** a la carpeta **Aplicaciones**
            3. Como la app aún no está notarizada por Apple, la primera vez macOS dirá que está "dañada". No lo está — es el aviso estándar para apps sin firma de Apple. Pega esto en Terminal y listo:

            ```
            xattr -cr /Applications/"Archive AI.app"
            ```

            Esto solo hace falta una vez por instalación.
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      # Publica el .app zipeado en la rama "release-bin" del propio repo.
      # Esto permite descargarlo por git (sin pasar por un navegador), lo que
      # evita que macOS le ponga la marca de cuarentena de Gatekeeper.
      - name: Publicar app en rama release-bin
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/Archive AI.app" \
            /tmp/ArchiveAI-macos.zip
          mkdir /tmp/relbranch && cd /tmp/relbranch
          cp /tmp/ArchiveAI-macos.zip .
          git init -b release-bin
          git add -A
          git -c user.name="github-actions" -c user.email="actions@users.noreply.github.com" \
            commit -m "Build ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            release-bin
